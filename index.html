<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo - Boda Lujosa y Clásica</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="elegant-background"></div>
    <div class="container">
        <!-- Language Toggle -->
        <header class="header">
            <div class="lang-toggle">
                <button id="btn-es" class="lang-btn active" onclick="setLanguage('es')">ES</button>
                <button id="btn-en" class="lang-btn" onclick="setLanguage('en')">EN</button>
            </div>
            
            <div class="title-container">
                <h1 id="main-title" class="elegant-title">Wedding Bingo</h1>
                <div class="decorative-divider">
                    <span class="line"></span>
                    <span class="diamond"></span>
                    <span class="line"></span>
                </div>
                <p id="instructions" class="instructions">
                    Marca todos los momentos especiales que observes durante nuestra boda y gana.
                </p>
                <p id="player-name-display" class="player-name" style="display: none;"></p>
                <div id="winner-banner" class="winner-banner" style="display: none;">
                    <h3 class="elegant-title" style="font-size: 1.5rem; margin-bottom: 0.5rem;" id="winner-banner-title">¡Tenemos un Ganador!</h3>
                    <p id="winner-banner-text" class="instructions" style="margin-top: 0; color: var(--gold-dark);"></p>
                </div>
            </div>
        </header>

        <main class="board-container">
            <div id="bingo-board" class="bingo-board">
                <!-- Cells will be generated by JavaScript -->
            </div>
            <div class="actions">
                <button id="win-btn" class="gold-btn win-btn" onclick="checkWin()" style="display: none;">
                    ¡BINGO!
                </button>
                <button id="reset-btn" class="gold-btn outline-btn" onclick="resetGame()" style="margin-top: 1rem;">
                    Reiniciar Tablero
                </button>
            </div>
        </main>

        <footer class="footer">
            <p id="footer-text">Gracias por acompañarnos en este día tan especial.</p>
        </footer>
    </div>

    <!-- Name Entry Modal -->
    <div id="name-modal" class="modal">
        <div class="modal-content classic-border">
            <h2 id="name-title" class="elegant-title modal-title">¡Bienvenido!</h2>
            <p id="name-instruction" class="modal-text" style="margin-bottom: 1.5rem;">Por favor, ingresa tu nombre para comenzar y guardar tu progreso.</p>
            <input type="text" id="guest-name-input" class="elegant-input" placeholder="Tu nombre" autocomplete="off">
            <button class="gold-btn win-btn" onclick="saveName()" style="margin-top: 1.5rem;" id="name-submit-btn">Comenzar</button>
        </div>
    </div>

    <!-- Confirm Reset Modal -->
    <div id="confirm-modal" class="modal">
        <div class="modal-content classic-border">
            <h2 class="elegant-title modal-title" id="confirm-title" style="color: #4A0E17;">¿Estás seguro?</h2>
            <p id="confirm-text" class="modal-text" style="margin-bottom: 2rem;"></p>
            <div class="actions" style="flex-direction: row; justify-content: space-around;">
                <button class="gold-btn outline-btn" style="width: 45%; padding: 0.8rem 1rem; border-color: #4A0E17; color: #4A0E17;" onclick="closeConfirmModal()" id="confirm-cancel-btn">Cancelar</button>
                <button class="gold-btn win-btn" style="width: 45%; padding: 0.8rem 1rem; background-color: #4A0E17;" onclick="executeReset()" id="confirm-ok-btn">Reiniciar</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
